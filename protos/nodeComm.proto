syntax = "proto3";
package protos;

option go_package = "github.com/utterwqlnut/utterdb/protos";

service Node {
  rpc Get(Request) returns (Value) {}
  rpc Erase(Request) returns (Empty) {}
  rpc RamUse(Empty) returns (Float) {}
  rpc CpuUse(Empty) returns (Float) {}
  rpc Write(Data) returns (Empty) {}
  rpc InitiateMove(NodeT) returns (Empty) {}
  rpc MoveData(VNode) returns (stream Data) {}
}

message Request {
  string key = 1;
  string type = 2;
}
message Float {
  float value = 1;
}
message Value {
  string value = 1;
}

message NodeT {
  string node_id = 1;
  VNode vnode_id = 2;
}

message VNode {
  string id = 1;
}

message Empty {}

message Data {
  string key = 1;
  string value = 2;
  string keyType = 3;
  string valueType = 4;
}
